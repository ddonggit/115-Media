; 115-Media — Single Container Process Manager
; Runs: Redis + FastAPI + Celery Worker + Celery Beat + p115tiny302

[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

; ── Redis (Celery broker) ────────────────────────────────────────
[program:redis]
command=redis-server --daemonize no --bind 127.0.0.1 --port 6379
autostart=true
autorestart=true
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; ── FastAPI backend (API + static frontend SPA) ──────────────────
[program:uvicorn]
command=uvicorn app.main:app --host 0.0.0.0 --port 8000
directory=/app
autostart=true
autorestart=true
priority=20
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; ── Celery worker ────────────────────────────────────────────────
[program:celery-worker]
command=celery -A app.core.celery_app.celery_app worker --loglevel=info
directory=/app
autostart=true
autorestart=true
priority=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; ── Celery beat (periodic tasks scheduler) ───────────────────────
[program:celery-beat]
command=celery -A app.core.celery_app.celery_app beat --loglevel=info
directory=/app
autostart=true
autorestart=true
priority=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; ── p115tiny302 (115 streaming 302 redirect) ─────────────────────
[program:tiny302]
command=python -c "from p115tiny302 import make_application; import uvicorn; uvicorn.run(make_application(), host='0.0.0.0', port=8095)"
directory=/app
autostart=true
autorestart=true
priority=40
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
